<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Iron Shop - Kanban Board</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        .kanban-column { min-height: 500px; transition: background 0.3s; }
        .ghost { opacity: 0.4; background: #c8ebfb; }
    </style>
</head>
<body class="bg-gray-100 p-8">
    <h1 class="text-3xl font-bold mb-8 text-center">Buyurtmalar boshqaruvi (Kanban)</h1>

    <div class="flex gap-4 overflow-x-auto">
        <div class="flex-1 min-w-[300px] bg-gray-200 p-4 rounded-lg">
            <h2 class="font-bold mb-4 border-b-2 border-blue-500 pb-2">Yangi (New)</h2>
            <div id="new" class="kanban-column space-y-3"></div>
        </div>

        <div class="flex-1 min-w-[300px] bg-gray-200 p-4 rounded-lg">
            <h2 class="font-bold mb-4 border-b-2 border-yellow-500 pb-2">Jarayonda (Process)</h2>
            <div id="process" class="kanban-column space-y-3"></div>
        </div>

        <div class="flex-1 min-w-[300px] bg-gray-200 p-4 rounded-lg">
            <h2 class="font-bold mb-4 border-b-2 border-green-500 pb-2">Bitgan (Finished)</h2>
            <div id="finished" class="kanban-column space-y-3"></div>
        </div>

        <div class="flex-1 min-w-[300px] bg-gray-200 p-4 rounded-lg">
            <h2 class="font-bold mb-4 border-b-2 border-red-500 pb-2">Bekor qilingan (Canceled)</h2>
            <div id="canceled" class="kanban-column space-y-3"></div>
        </div>
    </div>

    <script>
        const API_BASE = '/api/orders/';

        // Buyurtmalarni yuklash
        async function loadOrders() {
            const res = await fetch(API_BASE);
            const orders = await res.json();

            // Ustunlarni tozalash
            ['new', 'process', 'finished', 'canceled'].forEach(s => document.getElementById(s).innerHTML = '');

            orders.forEach(order => {
                const card = `
                    <div class="bg-white p-4 rounded shadow cursor-move border-l-4 border-gray-400" data-id="${order.id}">
                        <div class="font-bold">#${order.id} - ${order.full_name}</div>
                        <div class="text-sm text-gray-600">${order.phone_number}</div>
                        <div class="mt-2 font-semibold text-blue-600">${order.total_price} so'm</div>
                    </div>
                `;
                document.getElementById(order.status).insertAdjacentHTML('beforeend', card);
            });
        }

        // Drag & Drop funksiyasini sozlash
        ['new', 'process', 'finished', 'canceled'].forEach(status => {
            new Sortable(document.getElementById(status), {
                group: 'orders',
                ghostClass: 'ghost',
                animation: 150,
                onEnd: async (evt) => {
                    const orderId = evt.item.getAttribute('data-id');
                    const newStatus = evt.to.id;

                    // API orqali statusni yangilash
                    await fetch(`${API_BASE}${orderId}/update_status/`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ status: newStatus })
                    });
                    console.log(`Order ${orderId} moved to ${newStatus}`);
                }
            });
        });

        loadOrders();
    </script>
</body>
</html>
